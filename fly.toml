# ─── Fly.io Configuration ──────────────────────────────────────────
# Deploy: flyctl launch && flyctl deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "edda"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "server"

[env]
  NODE_ENV = "production"
  PORT = "8000"
  LLM_PROVIDER = "anthropic"
  EMBEDDING_PROVIDER = "voyage"
  CRON_RUNNER = "standalone"
  CHECKPOINTER_BACKEND = "postgres"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
